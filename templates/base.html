{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}EcoDash{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
  <header>
    <a class="marca" href="{% url 'inicio' %}">EcoDash</a>
    <nav>
      <a href="{% url 'clientes:menu' %}">Clientes</a>
      <a href="{% url 'repartidores:menu' %}">Repartidores</a>
      <a href="{% url 'envios:listado' %}">Envíos</a>
      <a href="{% url 'pagos:listado' %}">Pagos</a>
      <a href="{% url 'notificaciones:listado' %}">Notificaciones</a>
    </nav>
  </header>
  <main>{% block contenido %}{% endblock %}</main>
</body>
</html>
