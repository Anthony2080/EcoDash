<ul class="lista-modern">
  {% for envio in envios %}
  <li>
    <span>
      <strong>Envío #{{ envio.id_envio }}</strong>
      <span class="tag">{{ envio.get_estado_display|default:envio.estado }}</span>
    </span>
    <a href="{% url 'envios:detalle' envio.id_envio %}">Ver detalle</a>
  </li>
  {% empty %}
  <li>No hay envíos registrados.</li>
  {% endfor %}
</ul>
