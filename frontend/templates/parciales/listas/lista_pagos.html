<ul class="lista-modern">
  {% for pago in pagos %}
  <li>
    <span>
      <strong>Pago #{{ pago.id_pago }}</strong>
      <span class="tag">{{ pago.estado }}</span>
    </span>
    <span>${{ pago.monto }} · Envío #{{ pago.id_envio_id }}</span>
  </li>
  {% empty %}
  <li>No hay pagos registrados.</li>
  {% endfor %}
</ul>
