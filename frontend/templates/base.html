{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}EcoDash{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
  <link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
</head>
<body>
  {% block header %}
  <header class="header">
    <a class="marca" href="/">Eco<span>Dash</span></a>
    <nav>
      <a href="{% url 'clientes:menu' %}" title="Clientes"><i class="hgi-stroke hgi-user-01"></i></a>
      <a href="{% url 'repartidores:menu' %}" title="Repartidores"><i class="hgi-stroke hgi-bicycle-01"></i></a>
      <a href="{% url 'envios:listado' %}" title="Envíos"><i class="hgi-stroke hgi-delivery-box-01"></i></a>
      <a href="{% url 'pagos:listado' %}" title="Pagos"><i class="hgi-stroke hgi-credit-card-01"></i></a>
      <a href="{% url 'notificaciones:listado' %}" title="Notificaciones"><i class="hgi-stroke hgi-notification-01"></i></a>
    </nav>
  </header>
  {% endblock %}
  <main>{% block contenido %}{% endblock %}</main>
  <script src="{% static 'js/endpoints.js' %}"></script>
  <script src="{% static 'js/router.js' %}"></script>
</body>
</html>
