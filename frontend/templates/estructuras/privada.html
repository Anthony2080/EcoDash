{% extends "estructuras/base.html" %}
{% load static %}
{% block cuerpo %}
  {% block encabezado %}
    <header class="header">
      <a class="marca" href="/"><img src="{% static 'img/logo-ecodash.png' %}" alt="EcoDash" height="45"></a>
      <button class="hamburger" aria-label="Menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      {% include "parciales/navegacion/navegacion_general.html" %}
    </header>
  {% endblock %}
  <main>{% block contenido %}{% endblock %}</main>
{% endblock %}
{% block scripts %}
  <script src="{% static 'js/endpoints.js' %}?v=roles-20260627"></script>
  <script src="{% static 'js/router.js' %}?v=roles-20260627"></script>
  <script>
    document.querySelector('.hamburger')?.addEventListener('click', function() {
      var nav = this.nextElementSibling;
      var expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !expanded);
      nav.classList.toggle('nav-open');
    });
  </script>
{% endblock %}
