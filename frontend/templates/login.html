{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcoDash — Iniciar sesión</title>
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
  <link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
</head>
<body class="login-page">
  <div class="parallax-bg">
    <!-- Fila superior izquierda -->
    <i class="hgi-stroke hgi-delivery-box-01 float-icon float-1"></i>
    <i class="hgi-stroke hgi-bicycle-01 float-icon float-2"></i>
    <i class="hgi-stroke hgi-leaf-01 float-icon float-3"></i>
    <!-- Fila superior derecha -->
    <i class="hgi-stroke hgi-package float-icon float-4"></i>
    <i class="hgi-stroke hgi-star float-icon float-5"></i>
    <i class="hgi-stroke hgi-notification-01 float-icon float-6"></i>
    <!-- Fila media izquierda -->
    <i class="hgi-stroke hgi-user-01 float-icon float-7"></i>
    <i class="hgi-stroke hgi-credit-card-01 float-icon float-8"></i>
    <!-- Fila media derecha -->
    <i class="hgi-stroke hgi-delivery-box-01 float-icon float-9"></i>
    <i class="hgi-stroke hgi-bicycle-01 float-icon float-10"></i>
    <!-- Fila inferior izquierda -->
    <i class="hgi-stroke hgi-leaf-01 float-icon float-11"></i>
    <i class="hgi-stroke hgi-package float-icon float-12"></i>
    <!-- Fila inferior derecha -->
    <i class="hgi-stroke hgi-star float-icon float-13"></i>
    <i class="hgi-stroke hgi-user-01 float-icon float-14"></i>
    <i class="hgi-stroke hgi-notification-01 float-icon float-15"></i>
    <i class="hgi-stroke hgi-credit-card-01 float-icon float-16"></i>
  </div>

  <div class="login-card">
    <div class="login-header">
      <a href="/" class="btn-back" title="Volver al inicio"><i class="hgi-stroke hgi-arrow-left-01"></i> Volver</a>
      <div class="logo-centrado"><img src="{% static 'img/logo-ecodash.png' %}" alt="EcoDash" height="60"></div>
    </div>
    <p class="sub">Gestión de envíos inteligente</p>

    <form id="formLogin" action="/api/login/" method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input class="form-control" type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-accion" type="submit">Ingresar</button>
    </form>

    <form id="formRegistro" action="/api/registro/" method="post" class="hidden">
      {% csrf_token %}
      <div class="form-group">
        <label for="reg-nombre">Nombre completo</label>
        <input class="form-control" type="text" id="reg-nombre" name="nombre" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Correo electrónico</label>
        <input class="form-control" type="email" id="reg-email" name="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="form-group">
        <label for="reg-telefono">Teléfono</label>
        <input class="form-control" type="tel" id="reg-telefono" name="telefono" placeholder="11 1234 5678">
      </div>
      <div class="form-group">
        <label for="reg-direccion">Dirección</label>
        <input class="form-control" type="text" id="reg-direccion" name="direccion" placeholder="Calle y número">
      </div>
      <div class="form-group">
        <label for="reg-password">Contraseña</label>
        <input class="form-control" type="password" id="reg-password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-accion" type="submit">Crear cuenta</button>
    </form>

    <div class="toggle-auth">
      <span id="toggleText">¿No tenés cuenta?</span>
      <button type="button" id="toggleBtn">Crear una</button>
    </div>
  </div>

  <script src="{% static 'js/endpoints.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
