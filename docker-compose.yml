services:
  database:
    image: mysql:8.0
    container_name: ecodash_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: EcoDash_db
    ports:
      - "3306:3306"
    volumes:
      - ecodash_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    container_name: ecodash_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: database
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    depends_on:
      database:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: ecodash_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/static:/frontend/static:ro
      - ./frontend/templates:/frontend/templates:ro
    depends_on:
      - backend

volumes:
  ecodash_db_data:
